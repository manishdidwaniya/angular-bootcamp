services:
  postgres:
    image: postgres:16-alpine
    container_name: ajh-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ajh_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ajh_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-ai_job_hunter}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ajh_user} -d ${POSTGRES_DB:-ai_job_hunter}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ajh-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ajh-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ajh_user}:${POSTGRES_PASSWORD:-ajh_dev_pass}@postgres:5432/${POSTGRES_DB:-ai_job_hunter}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
      JOB_FRESHNESS_DAYS: ${JOB_FRESHNESS_DAYS:-7}
      JOB_SYNC_INTERVAL_MINUTES: ${JOB_SYNC_INTERVAL_MINUTES:-30}
      JOB_SYNC_PAGES_PER_PROVIDER: ${JOB_SYNC_PAGES_PER_PROVIDER:-2}
      ADZUNA_APP_ID: ${ADZUNA_APP_ID:-}
      ADZUNA_APP_KEY: ${ADZUNA_APP_KEY:-}
      ADZUNA_COUNTRY: ${ADZUNA_COUNTRY:-in}
      THEMUSE_API_KEY: ${THEMUSE_API_KEY:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ajh-frontend
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: ajh-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
